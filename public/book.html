<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Ticket | Smart Event Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260414d">
</head>
<body>
  <div id="site-header"></div>

  <main class="container py-5">
    <div class="row g-4 align-items-start">
      <div class="col-lg-5">
        <div id="bookingSummary" class="panel-card"></div>
      </div>
      <div class="col-lg-7">
        <div class="form-panel">
          <div class="section-title">Reserve your seat</div>
          <h1 class="fw-bold mb-2">Book Tickets</h1>
          <p class="text-muted mb-4">Choose how many seats you want and confirm your booking immediately.</p>
          <div class="row g-3 mb-4">
            <div class="col-md-4"><div class="mini-stat"><div class="label">Ticket ID</div><div class="value">Instant</div><div class="subtext">Issued on success</div></div></div>
            <div class="col-md-4"><div class="mini-stat"><div class="label">Seat control</div><div class="value">Live</div><div class="subtext">Tracked in MongoDB</div></div></div>
            <div class="col-md-4"><div class="mini-stat"><div class="label">Booking type</div><div class="value">Secure</div><div class="subtext">Auth required</div></div></div>
          </div>
          <div id="bookingStatus"></div>
          <form id="bookingForm" class="mt-3">
            <div class="mb-3">
              <label for="seatsBooked" class="form-label">Number of Seats</label>
              <select id="seatsBooked" class="form-select" required></select>
            </div>
            <button type="submit" class="btn btn-brand w-100 py-3">Confirm Booking</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/book.js"></script>
</body>
</html>
