<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Smart Event Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260414d">
</head>
<body>
  <div id="site-header"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-xl-6">
        <div class="form-panel">
          <div class="section-title">Start booking</div>
          <h1 class="fw-bold mb-2">Create your account</h1>
          <p class="text-muted mb-4">Register once and manage all your event bookings from one place.</p>
          <div id="registerStatus"></div>
          <form id="registerForm" class="mt-3">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" required>
            </div>
            <div class="mb-4">
              <label for="confirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-brand w-100 py-3">Create Account</button>
          </form>
          <div class="mt-3 small-muted">Already have an account? <a href="login.html">Login here</a></div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
