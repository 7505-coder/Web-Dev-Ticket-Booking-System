<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Event | Smart Event Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260414d">
</head>
<body>
  <div id="site-header"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-xl-8">
        <div class="form-panel">
          <div class="section-title">Event studio</div>
          <h1 id="eventPageTitle" class="fw-bold mb-2">Create Event</h1>
          <p class="text-muted mb-4">Add a new event or update an existing one with poster, schedule, and seat count.</p>
          <div id="eventStatus"></div>
          <form id="eventForm" class="mt-3" enctype="multipart/form-data">
            <div class="row g-3">
              <div class="col-md-12">
                <label for="title" class="form-label">Title</label>
                <input type="text" id="title" class="form-control" required>
              </div>
              <div class="col-md-12">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" class="form-control" rows="5" required></textarea>
              </div>
              <div class="col-md-6">
                <label for="date" class="form-label">Date and Time</label>
                <input type="datetime-local" id="date" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label for="location" class="form-label">Location</label>
                <input type="text" id="location" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label for="totalSeats" class="form-label">Total Seats</label>
                <input type="number" id="totalSeats" min="1" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label for="image" class="form-label">Event Image / Poster</label>
                <input type="file" id="image" accept="image/*" class="form-control">
              </div>
              <div class="col-12" id="imagePreview"></div>
            </div>
            <button type="submit" id="eventSubmitBtn" class="btn btn-brand w-100 py-3 mt-4">Create Event</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/create-event.js"></script>
</body>
</html>
