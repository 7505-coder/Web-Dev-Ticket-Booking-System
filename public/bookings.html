<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings | Smart Event Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260414d">
</head>
<body>
  <div id="site-header"></div>

  <main class="container py-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
      <div>
        <div class="section-title">Booking history</div>
        <h1 class="fw-bold mb-2">My Bookings</h1>
        <p class="text-muted mb-0">Track all reserved seats and ticket IDs in one place.</p>
      </div>
    </div>
    <div id="bookingsStatus"></div>
    <div class="search-toolbar mt-3 mb-4">
      <input type="search" id="bookingSearchInput" class="form-control" placeholder="Search by ticket ID or event title">
      <button id="bookingSearchBtn" class="btn btn-brand px-4" type="button">Search</button>
      <button id="bookingResetBtn" class="btn btn-outline-brand px-4" type="button">Reset</button>
    </div>
    <div id="bookingsSummary" class="row g-3 mb-4"></div>
    <div id="bookingsList" class="row g-4 mt-2"></div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/my-bookings.js"></script>
</body>
</html>
