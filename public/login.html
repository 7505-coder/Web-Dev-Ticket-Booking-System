<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login | Smart Event Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260414d">
</head>
<body>
  <div id="site-header"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-xl-6">
        <div class="form-panel">
          <div class="section-title">Welcome back</div>
          <h1 class="fw-bold mb-2">User Login</h1>
          <p class="text-muted mb-4">Access your bookings, seat selections, and ticket history.</p>
          <div id="loginStatus"></div>
          <form id="loginForm" class="mt-3">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-brand w-100 py-3">Login</button>
          </form>
          <div class="d-flex justify-content-between flex-wrap gap-2 mt-3 small-muted">
            <span>New here? <a href="register.html">Register</a></span>
            <span><a href="admin-login.html">Admin login</a></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
