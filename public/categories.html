<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Categories | Smart Event Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260414d">
</head>
<body>
  <div id="site-header"></div>

  <main class="container py-5">
    <section class="hero-shell p-4 p-lg-5 mb-4">
      <div class="section-title">Discovery Hub</div>
      <h1 class="hero-title mb-3">Explore by event categories</h1>
      <p class="hero-copy mb-0">Find events by domain, browse featured picks, and jump directly into booking flows.</p>
    </section>

    <section class="section-shell mb-4">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <div>
          <div class="section-title mb-1">Featured</div>
          <h3 class="fw-bold mb-0">Spotlight carousel</h3>
        </div>
      </div>
      <div id="featuredStatus"></div>
      <div id="featuredCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner" id="featuredCarouselInner"></div>
        <button class="carousel-control-prev" type="button" data-bs-target="#featuredCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#featuredCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </section>

    <section class="section-shell">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <div>
          <div class="section-title mb-1">Categories</div>
          <h3 class="fw-bold mb-0">Browse by interest</h3>
        </div>
      </div>
      <div id="categoriesGrid" class="row g-3"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/categories.js"></script>
</body>
</html>
